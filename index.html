<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Garden - Alive</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./style.css">

  <!-- Core Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

  <!-- 3D Garden -->
  <div id="webgl-container"></div>

  <!-- Lockscreen -->
  <div id="lockscreen">
    <p class="lock-label">A gift is waiting</p>
    <p class="lock-until">Unlocks on 30th April 2026</p>
    <div class="lock-clock">
      <div class="lock-unit"><span class="lock-digits" id="lk-d">00</span><span class="lock-unit-label">Days</span></div>
      <div class="lock-colon">:</div>
      <div class="lock-unit"><span class="lock-digits" id="lk-h">00</span><span class="lock-unit-label">Hours</span></div>
      <div class="lock-colon">:</div>
      <div class="lock-unit"><span class="lock-digits" id="lk-m">00</span><span class="lock-unit-label">Mins</span></div>
    </div>
    <p class="lock-hint">hold to enter early</p>
  </div>

  <!-- Hold Ring -->
  <div id="hold-ring-container">
    <svg width="120" height="120" viewBox="0 0 100 100">
      <circle class="progress-track" cx="50" cy="50" r="45"></circle>
      <circle class="progress-circle" cx="50" cy="50" r="45"></circle>
    </svg>
  </div>

  <!-- Overlays -->
  <div id="scene-ripple-layer"></div>
  <div id="cinematic-overlay"><div class="cinematic-line" id="cinematic-line"></div></div>
  <div id="whisper">I was waiting for you.</div>
  <div id="fx-hint">move to stir the petals</div>
  <div id="portal-circle"></div>
  <div id="white-flash"></div>

  <!-- Hero -->
  <div id="hero-overlay">
    <p class="hero-label">A Birthday Offering</p>
    <p class="hero-name" id="hero-name">Miss Rider</p>
    <div class="hero-rule" id="hero-rule"></div>
    <p class="hero-date" id="hero-date">Since &middot; 26 August 2025</p>
  </div>

  <!-- Music Toggles -->
  <button id="mp3-toggle" aria-label="Toggle Für Elise">
    <svg width="12" height="16" viewBox="0 0 12 16" fill="none">
      <ellipse cx="4.5" cy="13" rx="3.2" ry="2" fill="rgba(201,168,76,0.88)" transform="rotate(-18 4.5 13)"/>
      <line x1="7.5" y1="2" x2="7.5" y2="13" stroke="rgba(201,168,76,0.88)" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M7.5 2 C10 2.5 11 5 9 7 C11 5.5 12 8 9.5 10" stroke="rgba(201,168,76,0.75)" stroke-width="1.1" stroke-linecap="round" fill="none"/>
    </svg>
  </button>
  <button id="music-toggle" aria-label="Toggle ambient">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M2 5.5h2.5L9 2v11L4.5 9.5H2a.5.5 0 0 1-.5-.5V6a.5.5 0 0 1 .5-.5z" fill="rgba(201,168,76,0.88)"/>
      <path d="M11 5a3.5 3.5 0 0 1 0 5" stroke="rgba(201,168,76,0.88)" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M12.8 3a6.2 6.2 0 0 1 0 9" stroke="rgba(201,168,76,0.42)" stroke-width="1.0" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Vignette & Grain -->
  <div id="vignette"></div>
  <div id="grain"></div>

  <!-- Sections (populated by JS) -->
  <div id="poem-overlay"></div>
  <div id="gift-overlay"></div>
  <div id="portrait-overlay"></div>
  <div id="cake-overlay"></div>
  <div id="ending-overlay"></div>

  <!-- Confetti Canvas -->
  <canvas id="cracker-canvas" style="position:fixed;inset:0;z-index:49;pointer-events:none;"></canvas>

  <!-- ── Core Scripts ── -->
  <script src="./utils.js"></script>
  <script src="./audio.js"></script>

  <!-- ── Sections ── -->
  <script src="./poem.js"></script>
  <script src="./gift.js"></script>
  <script src="./portrait.js"></script>
  <script src="./cake.js"></script>
  <script src="./ending.js"></script>

  <!-- ── Portal & Unlock ── -->
  <script src="./portal.js"></script>

  <!-- ── Lockscreen (runs last, calls unlockGarden) ── -->
  <script src="./lockscreen.js"></script>

  <!-- ── 3D Garden ── -->
  <script src="./garden.js"></script>

  <!-- ── Particles ── -->
  <script src="./particles.js"></script>

</body>
</html>
