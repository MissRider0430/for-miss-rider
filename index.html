<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Miss Rider</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    :root {
      --bg: #040203;
      --moon: #f4ddd0;
      --rose: #f5b7c4;
      --soft: rgba(255, 235, 225, 0.82);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Cormorant Garamond', serif;
      color: var(--soft);
      touch-action: manipulation;
    }

    #webgl-container,
    #vignette,
    #grain,
    #fade-to-black,
    #story-stage,
    #lockscreen {
      position: fixed;
      inset: 0;
    }

    #webgl-container {
      z-index: 1;
      opacity: 0;
      filter: blur(18px) brightness(0.25);
      transition: opacity 2.2s ease, filter 3.2s ease;
    }

    #webgl-container.unlocked {
      opacity: 1;
      filter: blur(0) brightness(1);
    }

    #vignette {
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.2) 48%, rgba(0,0,0,0.76) 100%);
    }

    #grain {
      z-index: 5;
      pointer-events: none;
      opacity: 0.05;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 3px 3px;
      mix-blend-mode: soft-light;
    }

    #lockscreen {
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: radial-gradient(circle at center, rgba(36,8,16,0.18), rgba(0,0,0,0.78));
      cursor: pointer;
    }

    .lock-inner {
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .lock-main,
    .lock-sub {
      margin: 0;
      opacity: 0;
      transform: translateY(8px);
      animation: lockReveal 1.4s ease forwards;
    }

    .lock-main {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 6.4vw, 52px);
      letter-spacing: 0.08em;
      color: var(--moon);
    }

    .lock-sub {
      animation-delay: 0.35s;
      font-style: italic;
      font-size: clamp(20px, 4.4vw, 30px);
      color: rgba(255, 227, 214, 0.74);
    }

    .lock-hint {
      margin-top: 10px;
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
      letter-spacing: 0.32em;
      font-size: 10px;
      color: rgba(255, 206, 192, 0.4);
      animation: hintPulse 2.6s ease-in-out infinite;
    }

    #story-stage {
      z-index: 8;
      display: grid;
      place-items: center;
      pointer-events: none;
      padding: 20px;
    }

    .story-block {
      width: min(860px, 92vw);
      text-align: center;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1.8s ease, transform 1.8s ease;
    }

    .story-block.show {
      opacity: 1;
      transform: translateY(0);
    }

    .story-line {
      margin: 0;
      font-size: clamp(27px, 4.5vw, 44px);
      line-height: 1.35;
      letter-spacing: 0.02em;
      color: var(--soft);
      text-shadow: 0 0 18px rgba(255, 182, 196, 0.12);
    }

    .poem-line {
      margin: 0;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 1.5s ease, transform 1.5s ease, text-shadow 1.5s ease;
      font-size: clamp(26px, 4.8vw, 46px);
      line-height: 1.35;
    }

    .poem-line.show {
      opacity: 1;
      transform: translateY(0);
    }

    .poem-line.glow {
      text-shadow: 0 0 28px rgba(255, 192, 210, 0.42), 0 0 56px rgba(255, 168, 194, 0.24);
    }

    #fade-to-black {
      z-index: 12;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 4.5s ease;
    }

    @keyframes lockReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.85; }
    }

    @media (max-width: 680px) {
      .story-line,
      .poem-line {
        font-size: clamp(22px, 7vw, 34px);
      }
    }
  </style>
</head>
<body>
  <div id="webgl-container"></div>

  <div id="lockscreen" aria-label="Lockscreen">
    <div class="lock-inner">
      <p class="lock-main">Not yet…</p>
      <p class="lock-sub">Just a little longer, Miss Rider.</p>
      <p class="lock-hint">hold to begin</p>
    </div>
  </div>

  <div id="story-stage" aria-live="polite"></div>
  <div id="vignette"></div>
  <div id="grain"></div>
  <div id="fade-to-black"></div>

  <script>
    (function () {
      const container = document.getElementById('webgl-container');
      const lockscreen = document.getElementById('lockscreen');
      const storyStage = document.getElementById('story-stage');
      const fadeToBlack = document.getElementById('fade-to-black');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x040203);
      scene.fog = new THREE.FogExp2(0x040203, 0.0024);

      const camera = new THREE.PerspectiveCamera(64, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 170);

      const isMobile = window.matchMedia('(max-width: 900px), (pointer: coarse)').matches;
      const isLowEnd = isMobile || (navigator.hardwareConcurrency || 4) <= 4;

      const renderer = new THREE.WebGLRenderer({ antialias: !isLowEnd, powerPreference: 'high-performance' });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(isLowEnd ? 1 : Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;
      container.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 1.0);
      scene.add(ambient);

      const moon = new THREE.DirectionalLight(0xffe5d8, 1.12);
      moon.position.set(50, 100, 30);
      scene.add(moon);

      const roseFill = new THREE.PointLight(0xff7da1, 1.8, 280);
      roseFill.position.set(-45, -10, 80);
      scene.add(roseFill);

      function radial(inner, outer) {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
        g.addColorStop(0, inner);
        g.addColorStop(1, outer);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, 256, 256);
        return new THREE.CanvasTexture(canvas);
      }

      const starTex = radial('rgba(255,244,235,1)', 'rgba(255,244,235,0)');
      const mistTex = radial('rgba(255,155,175,0.65)', 'rgba(255,155,175,0)');

      const starGeometry = new THREE.BufferGeometry();
      const starCount = isLowEnd ? 300 : 700;
      const starPositions = new Float32Array(starCount * 3);
      for (let i = 0; i < starPositions.length; i++) {
        starPositions[i] = (Math.random() - 0.5) * 700;
      }
      starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
      const starField = new THREE.Points(starGeometry, new THREE.PointsMaterial({
        map: starTex,
        size: 1.7,
        transparent: true,
        opacity: 0.95,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      }));
      scene.add(starField);

      const mistGeometry = new THREE.BufferGeometry();
      const mistCount = isLowEnd ? 80 : 150;
      const mistPositions = new Float32Array(mistCount * 3);
      const mistSpeedX = new Float32Array(mistCount);
      const mistSpeedY = new Float32Array(mistCount);
      for (let i = 0; i < mistCount; i++) {
        mistPositions[i * 3] = (Math.random() - 0.5) * 540;
        mistPositions[i * 3 + 1] = (Math.random() - 0.5) * 360;
        mistPositions[i * 3 + 2] = -140 + Math.random() * 160;
        mistSpeedX[i] = (Math.random() - 0.5) * 0.05;
        mistSpeedY[i] = Math.random() * 0.017;
      }
      mistGeometry.setAttribute('position', new THREE.BufferAttribute(mistPositions, 3));
      const mistField = new THREE.Points(mistGeometry, new THREE.PointsMaterial({
        map: mistTex,
        size: isLowEnd ? 24 : 30,
        color: 0xff8ca8,
        transparent: true,
        opacity: 0.14,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      }));
      scene.add(mistField);

      const bloomGroup = new THREE.Group();
      scene.add(bloomGroup);

      function createPetalTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createLinearGradient(0, 512, 0, 0);
        grad.addColorStop(0, '#22040c');
        grad.addColorStop(0.5, '#b61538');
        grad.addColorStop(1, '#ff6c9a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 512);
        return new THREE.CanvasTexture(canvas);
      }

      const petalTexture = createPetalTexture();
      const petalGeometry = new THREE.PlaneGeometry(6, 20, 14, 14);
      const p = petalGeometry.attributes.position;
      for (let i = 0; i < p.count; i++) {
        const x = p.getX(i);
        const y = p.getY(i);
        const ny = (y + 10) / 20;
        const pinch = Math.pow(Math.sin(ny * Math.PI), 0.5);
        p.setXYZ(i, x * pinch, y, (x * x) * 0.12 - Math.sin(ny * Math.PI) * 3.6);
      }
      petalGeometry.computeVertexNormals();
      petalGeometry.translate(0, 10, 0);

      function petalMaterial() {
        return new THREE.MeshBasicMaterial({ map: petalTexture, side: THREE.DoubleSide });
      }

      function buildLily() {
        const flower = new THREE.Group();
        for (let i = 0; i < 6; i++) {
          const petal = new THREE.Mesh(petalGeometry, petalMaterial());
          petal.rotation.y = i * (Math.PI * 2 / 6);
          petal.rotation.x = i % 2 === 0 ? 1.36 : 1.62;
          petal.position.y = i % 2 === 0 ? 0 : -0.8;
          flower.add(petal);
        }
        flower.position.set((Math.random() - 0.5) * 360, (Math.random() - 0.5) * 280, (Math.random() - 0.5) * 120);
        flower.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * 0.5);
        flower.userData = {
          speedY: Math.random() * 0.22 + 0.08,
          speedX: (Math.random() - 0.5) * 0.12,
          rotX: (Math.random() - 0.5) * 0.01,
          rotY: (Math.random() - 0.5) * 0.01
        };
        return flower;
      }

      const lilies = [];
      const lilyCount = isLowEnd ? 5 : 8;
      for (let i = 0; i < lilyCount; i++) {
        const lily = buildLily();
        bloomGroup.add(lily);
        lilies.push(lily);
      }

      let lastFrame = performance.now();
      let time = 0;
      let unlocked = false;
      let holdTimer = null;
      let cinematicDepth = 0;

      function wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      function hideCurrentBlock() {
        const current = storyStage.querySelector('.story-block');
        if (!current) return Promise.resolve();
        current.classList.remove('show');
        return wait(1800).then(() => {
          if (current.parentNode) current.parentNode.removeChild(current);
        });
      }

      async function showLine(text, duration, className = 'story-line', glow = false) {
        await hideCurrentBlock();

        const block = document.createElement('div');
        block.className = 'story-block';

        const line = document.createElement('p');
        line.className = className;
        line.textContent = text;
        block.appendChild(line);
        storyStage.appendChild(block);

        requestAnimationFrame(() => {
          block.classList.add('show');
          if (glow) line.classList.add('glow');
        });

        await wait(duration);
      }

      async function playStory() {
        await wait(7000);

        const poem = [
          'You move like the night owns you,',
          'like silence chose you first.',
          'There’s something in your eyes—',
          'not chaos… not calm…',
          'something in between.',
          'And somehow,',
          'it feels like home.'
        ];

        for (let i = 0; i < poem.length; i++) {
          const isGlow = i === 0 || i === 6;
          await showLine(poem[i], 3600, 'poem-line', isGlow);
        }

        await showLine('You are steel in the storm, and silk in the quiet.', 5200);
        await showLine('This gift is only a mirror of that: strength, grace, and the softness you hide so well.', 6400);

        await showLine('Happy Birthday, Miss Rider.', 4200);
        await showLine('You changed something in me.', 4700);

        await showLine('Stay a little longer.', 5200);
        await hideCurrentBlock();
        fadeToBlack.style.opacity = '1';
      }

      function unlock() {
        if (unlocked) return;
        unlocked = true;
        lockscreen.style.pointerEvents = 'none';

        gsap.to(lockscreen, {
          opacity: 0,
          duration: 1.4,
          ease: 'power2.inOut',
          onComplete: () => {
            lockscreen.style.display = 'none';
          }
        });

        container.classList.add('unlocked');
        playStory();
      }

      function startHold(event) {
        if (unlocked) return;
        if (event.cancelable) event.preventDefault();
        holdTimer = setTimeout(unlock, 1200);
      }

      function cancelHold() {
        if (holdTimer) clearTimeout(holdTimer);
        holdTimer = null;
      }

      lockscreen.addEventListener('pointerdown', startHold);
      lockscreen.addEventListener('pointerup', cancelHold);
      lockscreen.addEventListener('pointerleave', cancelHold);
      lockscreen.addEventListener('pointercancel', cancelHold);

      function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const delta = Math.min((now - lastFrame) / 16.67, 2.5);
        lastFrame = now;
        time += 0.01 * delta;

        if (unlocked) {
          cinematicDepth = Math.min(cinematicDepth + 0.0014 * delta, 1);
        } else {
          cinematicDepth = Math.max(cinematicDepth - 0.003 * delta, 0);
        }

        camera.position.z = 170 - (cinematicDepth * 22) + Math.sin(time * 0.08) * 1.8;
        camera.position.x = Math.sin(time * 0.035) * 3.2;
        camera.position.y = Math.cos(time * 0.03) * 2.4;
        camera.lookAt(scene.position);

        starField.rotation.y += 0.00028;
        mistField.rotation.y += 0.00008;
        bloomGroup.rotation.y = Math.sin(time * 0.08) * 0.05;
        bloomGroup.rotation.x = Math.cos(time * 0.06) * 0.03;

        const mistAttr = mistGeometry.attributes.position;
        for (let i = 0; i < mistCount; i++) {
          const ix = i * 3;
          mistPositions[ix] += mistSpeedX[i];
          mistPositions[ix + 1] += mistSpeedY[i];
          if (mistPositions[ix] > 280) mistPositions[ix] = -280;
          if (mistPositions[ix] < -280) mistPositions[ix] = 280;
          if (mistPositions[ix + 1] > 180) mistPositions[ix + 1] = -180;
          if (mistPositions[ix + 1] < -180) mistPositions[ix + 1] = 180;
        }
        mistAttr.needsUpdate = true;

        lilies.forEach((flower) => {
          flower.position.x += flower.userData.speedX;
          flower.position.y += flower.userData.speedY;
          flower.rotation.x += flower.userData.rotX;
          flower.rotation.y += flower.userData.rotY;
          if (flower.position.y > 230) {
            flower.position.y = -220;
            flower.position.x = (Math.random() - 0.5) * 360;
          }
        });

        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    })();
  </script>
</body>
</html>
